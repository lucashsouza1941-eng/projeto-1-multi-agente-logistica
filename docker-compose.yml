services:
  postgres:
    image: postgres:16-alpine
    container_name: logiagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: logiagent
      POSTGRES_PASSWORD: logiagent
      POSTGRES_DB: logiagent
    ports:
      # 5433 evita conflito com PostgreSQL instalado localmente na porta 5432
      - "5433:5432"
    volumes:
      - logiagent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logiagent -d logiagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: logiagent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  logiagent_pgdata:
