name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/api/pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm --dir apps/api run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/api/pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm test:coverage

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/api/pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: logiagent
          POSTGRES_PASSWORD: logiagent
          POSTGRES_DB: logiagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U logiagent -d logiagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      CI: true
      DATABASE_URL: postgresql://logiagent:logiagent@localhost:5432/logiagent
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-minimum-32-characters-long!!
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
      INTERNAL_API_URL: http://localhost:3001
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      PLAYWRIGHT_API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/api/pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm --dir apps/api exec prisma migrate deploy
      - run: pnpm --dir apps/api exec prisma db seed
      - run: pnpm --dir apps/api run build
      - name: Start API
        run: pnpm --dir apps/api run start:prod &
      - name: Wait for API
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:3001/health && exit 0
            sleep 2
          done
          exit 1
      - run: pnpm build
      - name: Start Next
        env:
          HOSTNAME: 0.0.0.0
          PORT: 3000
        run: pnpm start &
      - name: Wait for Next
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:3000/ && exit 0
            sleep 2
          done
          exit 1
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm exec playwright test
